# Example HTTPServer configuration.
# Run with:  ./httpserver --config httpserver.example.ini

[server]
port              = 8080
document_root     = ./www
log_target        = httpserver.log     ; or "syslog"
log_max_file_size = 10485760           ; 10 MiB; 0 disables rotation
log_max_rotated   = 5

# Uncomment to enable TLS (both keys required together):
# tls_certificate = /etc/ssl/certs/server.crt
# tls_private_key = /etc/ssl/private/server.key
