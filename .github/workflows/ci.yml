name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  release-build:
    name: Release build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizer-build:
    name: Debug build with ASan + UBSan
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libcurl4-openssl-dev
      - name: Configure
        run: |
          cmake -S . -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build-san --parallel
      - name: Test
        run: ctest --test-dir build-san --output-on-failure
